services:
  api:
    build:
      context: .
      dockerfile: Pulse.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PulseDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      - Email__Provider=${EMAIL_PROVIDER}
      - Email__FromAddress=${EMAIL_FROM_ADDRESS}
      - Email__FromName=${EMAIL_FROM_NAME}
      - Email__ApiKey=${EMAIL_API_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Pulse.Worker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PulseDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
    depends_on:
      api:
        condition: service_started
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD}
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQL_SA_PASSWORD}' -Q 'SELECT 1' -b -No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlserver_data:
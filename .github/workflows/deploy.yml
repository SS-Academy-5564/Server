name: Deploy to Azure

on:
  # TEMPORARY: run on PRs to test the pipeline without waiting for merge to main.
  # Restore the `push` trigger below (and remove `pull_request`) once testing is done.
  pull_request:
  # push:
  #   branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ss-academy-5564

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: pulse-backend
            dockerfile: Pulse.API/Dockerfile
          - image: pulse-worker
            dockerfile: Pulse.Worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          # Both Dockerfiles COPY Pulse.slnx and every .csproj from the repo root,
          # so the build context must be the repo root, not the project folder.
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger API Webhook
        if: matrix.image == 'pulse-backend' 
        run: curl -i -X POST -k '${{ secrets.AZURE_WEBHOOK_API }}'

      - name: Trigger Worker Webhook
        if: matrix.image == 'pulse-worker'
        run: curl -i -X POST -k '${{ secrets.AZURE_WEBHOOK_WORKER }}'
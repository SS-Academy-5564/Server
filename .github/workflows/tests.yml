name: Unit Tests
on:
  pull_request:
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: dotnet restore Pulse.slnx
      - run: dotnet test Pulse.slnx --no-restore --verbosity normal
name: Build & Unit Tests
on:
  pull_request:
jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: pulse-backend
            dockerfile: Pulse.API/Dockerfile
          - image: pulse-worker
            dockerfile: Pulse.Worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  unit-tests:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: dotnet restore Pulse.slnx
      - run: dotnet test Pulse.slnx --no-restore --verbosity normal
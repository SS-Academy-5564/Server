name: Format Check

on:
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - run: dotnet restore Pulse.slnx

      - id: format
        run: dotnet format Pulse.slnx --verify-no-changes --severity warn

      - if: failure() && steps.format.outcome == 'failure'
        run: echo "::error title=Formatting violations detected::Run 'dotnet format Pulse.slnx' locally to fix"
